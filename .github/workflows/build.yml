name: Build Windows, macOS, and Linux App

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # Allows electron-builder to create releases

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Sync version with tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "Syncing package.json version to $VERSION"
          npm version $VERSION --no-git-tag-version
        shell: bash

      - name: Install dependencies
        run: npm install

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools fpm
        shell: bash

      - name: Fix permissions (Linux)
        if: runner.os == 'Linux'
        run: chmod +x node_modules/app-builder-bin/linux/x64/app-builder
        shell: bash

      - name: Fix permissions (Windows)
        if: runner.os == 'Windows'
        run: chmod +x node_modules/app-builder-bin/win/x64/app-builder.exe
        shell: bash

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: dist/
