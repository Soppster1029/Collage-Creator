name: Build Windows, macOS, and Linux App

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # Allows electron-builder to create releases

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache electron-builder dependencies
        uses: actions/cache@v4
        with:
          path: .cache/electron-builder
          key: ${{ runner.os }}-electron-builder-v2-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-electron-builder-v2-

      - name: Install dependencies
        run: npm ci

      - name: Sync version with tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "Syncing package.json version to $VERSION"
          npm version $VERSION --no-git-tag-version
        shell: bash

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get install -y libarchive-tools ruby-dev build-essential || (sleep 10 && sudo apt-get update && sudo apt-get install -y libarchive-tools ruby-dev build-essential)
          sudo gem install --no-document fpm
        shell: bash

      - name: Fix permissions (Linux)
        if: runner.os == 'Linux'
        run: chmod +x node_modules/app-builder-bin/linux/x64/app-builder
        shell: bash

      - name: Fix permissions (Windows)
        if: runner.os == 'Windows'
        run: chmod +x node_modules/app-builder-bin/win/x64/app-builder.exe
        shell: bash

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: matrix.os == 'macos-latest' && github.event_name == 'workflow_dispatch'
        run: npx electron-builder --mac --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip icon for Portable HTML
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/v')
        run: |
          # Remove the favicon and landing page image tags to make it standalone
          sed -i '/rel="icon"/d' collage-slideshow.html
          sed -i '/src="assets\/icon.png"/d' collage-slideshow.html

      - name: Upload Portable HTML to Release
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: collage-slideshow.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: matrix.os != 'macos-latest' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.os }}
          path: dist/
